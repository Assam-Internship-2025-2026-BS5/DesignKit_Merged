name: playground
description: "FGFC Bank Design System Playground – unified Mobile + Web component explorer"
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Unified FGFC Design Kit (local path)
  designkit:
    path: ../designkit

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    # Shared brand assets
    - assets/hdfc_logo.png
    - assets/right_back.png
    # Web team assets (BS06)
    - assets/left_image.png
    - assets/lock.png
    - assets/now_logo.png
    - assets/qr_login.png
    # Mobile team assets (BS05)
    - assets/Qr_scan.png
    - assets/Icon.png
    - assets/Send_money.png
    - assets/Pay_bills.png
    - assets/Product_services.png
